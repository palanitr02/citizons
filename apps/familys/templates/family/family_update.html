{% extends 'base.html' %}

{% block content %}

<div class="card shadow">

    <div class="card-header bg-warning text-dark">
        <h4>Update Family</h4>
    </div>

    <div class="card-body">

        <form method="POST">

            {% csrf_token %}

            <div class="row">

                <!-- ration_card_number -->
                <div class="col-md-6 mb-3">

                    <label class="form-label">
                        ration_card_number
                    </label>

                    <input
                        type="text"
                        name="ration_card_no"
                        class="form-control"
                        value="{{ family.ration_card_no }}"
                        required
                    >

                </div>

                <!-- family_name -->
                <div class="col-md-6 mb-3">

                    <label class="form-label">
                        family_name
                    </label>

                    <input
                        type="text"
                        name="family_name"
                        class="form-control"
                        value="{{ family.family_name }}"
                        required
                    >

                </div>

                <!-- District -->
                <div class="col-md-6 mb-3">

                    <label class="form-label">
                        District
                    </label>

                    <input
                        type="text"
                        name="district"
                        class="form-control"
                        value="{{ family.district }}"

                    >

                </div>



                <!-- State -->
                <div class="col-md-6 mb-3">

                    <label class="form-label">
                        State
                    </label>

                    <input
                        type="text"
                        name="state"
                        class="form-control"
                        value="{{ family.state }}"
                    >

                </div>

                <!-- Pincode -->
                <div class="col-md-6 mb-3">

                    <label class="form-label">
                        Pincode
                    </label>

                    <input
                        type="number"
                        name="pincode"
                        class="form-control"
                        value="{{ family.pincode }}"
                    >


                </div>

            </div>
            <!-- Buttons -->
            <div class="mt-3">

                <button type="submit" class="btn btn-success">
                    Update
                </button>

                <a href="{% url 'family-list' %}" class="btn btn-secondary">
                    Cancel
                </a>

            </div>

        </form>

    </div>

</div>

{% endblock %}
