<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
</head>
<body>

<h2>Register</h2>

<form method="POST">

    {% csrf_token %}

    <div>
        <label>Username</label>
        {{ form.username }}
    </div>

    <div>
        <label>Password</label>
        {{ form.password }}
    </div>

    <div>
        <label>Role</label>
        {{ form.role }}
    </div>

    <button type="submit">
        Register
    </button>

</form>

</body>
</html>
