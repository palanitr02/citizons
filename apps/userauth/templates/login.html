<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body>

<h2>Login</h2>

<form method="POST">

    {% csrf_token %}

    <div>
        <label>Username</label>
        {{ form.username }}
    </div>

    <div>
        <label>Password</label>
        {{ form.password }}
    </div>

    <button type="submit">
        Login
    </button>

</form>

{% for message in messages %}
    <p>{{ message }}</p>
{% endfor %}

</body>
</html>
