{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4>Create Person</h4>

        <a href="{% url 'person_list' %}" class="btn btn-primary">
            Add person
        </a>
    </div>

<div class="card shadow">


    <div class="card-body">

        <form method="POST">

            {% csrf_token %}

            <div class="row">

                <!-- First Name -->
                <div class="col-md-6 mb-3">

                    <label class="form-label">
                        First Name
                    </label>

                    <input
                        type="text"
                        name="firstname"
                        class="form-control"
                        required
                    >

                </div>

                <!-- Last Name -->
                <div class="col-md-6 mb-3">

                    <label class="form-label">
                        Last Name
                    </label>

                    <input
                        type="text"
                        name="lastname"
                        class="form-control"
                        required
                    >

                </div>

                <!-- DOB -->
                <div class="col-md-6 mb-3">

                    <label class="form-label">
                        Date of Birth
                    </label>

                    <input
                        type="date"
                        name="dob"
                        class="form-control"
                    >

                </div>

                <!-- Gender -->
                <div class="col-md-6 mb-3">

                    <label class="form-label">
                        Gender
                    </label>

                    <select
                        name="gender"
                        class="form-select"
                    >

                        <option value="male">Male</option>
                        <option value="female">Female</option>
                        <option value="others">Others</option>

                    </select>

                </div>

                <!-- Aadhaar -->
                <div class="col-md-6 mb-3">

                    <label class="form-label">
                        Aadhaar Number
                    </label>

                    <input
                        type="text"
                        name="adhar_num"
                        class="form-control"
                    >

                </div>

                <!-- Father -->
                <div class="col-md-6 mb-3">

                    <label class="form-label">
                        Father
                    </label>

                    <select
                        name="father"
                        class="form-select"
                    >

                        <option value="">
                            Select Father
                        </option>

                        {% for person in persons %}

                        <option value="{{ person.id }}">
                            {{ person.firstname }} {{ person.lastname }}
                        </option>

                        {% endfor %}

                    </select>

                </div>

                <!-- Mother -->
                <div class="col-md-6 mb-3">

                    <label class="form-label">
                        Mother
                    </label>

                    <select
                        name="mother"
                        class="form-select"
                    >

                        <option value="">
                            Select Mother
                        </option>

                        {% for person in page_obj %}

                        <option value="{{ person.id }}">
                            {{ person.firstname }} {{ person.lastname }}
                        </option>

                        {% endfor %}

                    </select>

                </div>

            </div>

            <button type="submit" class="btn btn-success">
                Save Person
            </button>

        </form>

    </div>

</div>
</div>

{% endblock %}
